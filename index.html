<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHA² Pilot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .rotate-3 { transform: rotate(3deg); }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#FDFCFB] text-slate-900 min-h-screen">

    <div id="app" class="max-w-7xl mx-auto p-4 md:p-10">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
            <div class="space-y-2">
                <div class="flex items-center gap-3">
                    <div class="bg-rose-500 p-2 rounded-2xl shadow-xl shadow-rose-100 rotate-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    </div>
                    <h1 class="text-4xl font-black tracking-tighter text-slate-900 italic uppercase">SAHA²</h1>
                </div>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-[0.3em] flex items-center gap-2">
                    Cohort Analysis <span class="text-rose-300">●</span> Wed, April 8, 2026
                </p>
            </div>

            <div class="bg-white border border-slate-100 p-4 rounded-[2rem] shadow-sm flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Launch Transition</p>
                    <p class="text-sm font-black text-slate-800">T-3 Days to April 11</p>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div id="stats-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
            <!-- Dynamic stats will be injected here -->
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <!-- Sidebar -->
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl shadow-slate-200 relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="flex items-center gap-2 mb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fb7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            <h3 class="font-black text-xs uppercase tracking-widest">Cohort Intelligence</h3>
                        </div>
                        <div id="intelligence-content" class="space-y-6">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
                    <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 px-1">Directory Filter</h3>
                    <input type="text" id="search-input" placeholder="Find pilot..." class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl text-sm font-bold focus:ring-2 focus:ring-rose-400 transition-all outline-none">
                    <div id="phase-filters" class="flex flex-wrap gap-2">
                        <!-- Filters injected by JS -->
                    </div>
                </div>
            </aside>

            <!-- Main List -->
            <main class="lg:col-span-8 space-y-4" id="pilot-list">
                <!-- Pilots injected by JS -->
            </main>
        </div>
    </div>

    <script>
        const LAUNCH_DATE = new Date("2026-04-11T12:00:00");
        const TODAY = new Date("2026-04-08T12:00:00");

        const PHASES = {
            MENSTRUAL: { name: 'Menstrual', color: 'bg-rose-500', text: 'text-rose-500', icon: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>' },
            FOLLICULAR: { name: 'Follicular', color: 'bg-emerald-500', text: 'text-emerald-500', icon: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7A7.1 7.1 0 1 1 5 8c0 .3 0 .6.1.9m13.2 1.4A7.1 7.1 0 0 1 19 12a7 7 0 1 1-13.9 1"/><path d="M12 2v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="M2 12h2"/><path d="m4.9 19.1 1.4-1.4"/><path d="M12 22v-2"/><path d="m19.1 19.1-1.4-1.4"/><path d="M22 12h-2"/><path d="m19.1 4.9-1.4 1.4"/></svg>' },
            OVULATORY: { name: 'Ovulatory', color: 'bg-amber-400', text: 'text-amber-400', icon: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.3 17.7-1.4 1.4"/><path d="m19.1 4.9-1.4 1.4"/></svg>' },
            LUTEAL: { name: 'Luteal', color: 'bg-indigo-500', text: 'text-indigo-500', icon: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>' }
        };

        const pilots = [
            { id: 1, name: "Juliana", cycleLength: "Not sure", symptoms: ["Acne", "Bloating", "Weight gain", "Irregular periods"], launchPhase: "Follicular", specificDayOnLaunch: null },
            { id: 2, name: "Paola Mayorga", cycleLength: "25-28", symptoms: ["Acne", "Mood changes", "Fatigue"], launchPhase: "Luteal", specificDayOnLaunch: null },
            { id: 3, name: "Farah Sinokrot", cycleLength: "28-32", symptoms: ["Bloating", "Weight gain", "Cramps", "Mood changes", "Fatigue", "Irregular periods"], launchPhase: "Luteal", specificDayOnLaunch: null },
            { id: 4, name: "Tomiwa Nihinlola", cycleLength: "28-32", symptoms: ["Acne", "Bloating", "Weight gain", "Fatigue", "Mood changes"], launchPhase: "Luteal", specificDayOnLaunch: 22 },
            { id: 5, name: "Natalia Alipranti", cycleLength: "Not sure", symptoms: ["Bloating", "Weight gain", "Cramps", "Irregular periods", "Mood changes"], launchPhase: "Follicular", specificDayOnLaunch: null },
            { id: 6, name: "Paloma Martinez", cycleLength: "28-32", symptoms: ["Acne", "Cramps"], launchPhase: "Follicular", specificDayOnLaunch: null },
            { id: 7, name: "Hana", cycleLength: "Not sure", symptoms: ["Acne", "Bloating", "Weight gain", "Cramps", "Mood changes", "Fatigue"], launchPhase: "Luteal", specificDayOnLaunch: null },
            { id: 8, name: "Isabel Nasser", cycleLength: "25-28", symptoms: ["Acne", "Bloating", "Cramps", "Mood changes", "Fatigue"], launchPhase: "Follicular", specificDayOnLaunch: null },
            { id: 9, name: "Asmae", cycleLength: "28-32", symptoms: ["Acne", "Cramps", "Irregular periods", "Mood changes", "Fatigue"], launchPhase: "Follicular", specificDayOnLaunch: null },
            { id: 10, name: "Fleur de Beaumont", cycleLength: "28-32", symptoms: ["Bloating", "Cramps", "Fatigue"], launchPhase: "Menstrual", specificDayOnLaunch: 2 },
            { id: 11, name: "Pascale Reymond", cycleLength: "25-28", symptoms: ["Bloating", "Cramps", "Mood changes", "Fatigue", "Weight gain"], launchPhase: "Follicular", specificDayOnLaunch: null },
            { id: 12, name: "Antonia Bascuñán", cycleLength: "25-28", symptoms: ["Bloating", "Weight gain", "Cramps", "Mood changes", "Fatigue"], launchPhase: "Follicular", specificDayOnLaunch: null },
            { id: 13, name: "Renata", cycleLength: "28-32", symptoms: ["Bloating", "Cramps", "Mood changes", "Fatigue"], launchPhase: "Menstrual", specificDayOnLaunch: 1 }
        ];

        let stateData = [];
        let currentFilter = 'All';
        let currentSearch = '';

        function calculatePilotState(user) {
            let avg = 28;
            if (user.cycleLength.includes('-')) {
                const parts = user.cycleLength.split('-').map(p => parseInt(p));
                avg = (parts[0] + parts[1]) / 2;
            }

            let dayOnLaunch = 0;
            if (user.specificDayOnLaunch) {
                dayOnLaunch = user.specificDayOnLaunch;
            } else {
                if (user.launchPhase.includes("Menstrual")) dayOnLaunch = 1;
                else if (user.launchPhase.includes("Follicular")) dayOnLaunch = 8;
                else if (user.launchPhase.includes("Luteal")) dayOnLaunch = 21;
                else dayOnLaunch = 15;
            }

            let currentDay = dayOnLaunch - 3;
            if (currentDay <= 0) currentDay = Math.round(avg) + currentDay;

            let currentPhase = PHASES.LUTEAL;
            if (currentDay <= 5) currentPhase = PHASES.MENSTRUAL;
            else if (currentDay <= 13) currentPhase = PHASES.FOLLICULAR;
            else if (currentDay <= 16) currentPhase = PHASES.OVULATORY;

            return { ...user, state: { currentDay, currentPhase, dayOnLaunch, launchPhase: user.launchPhase, avgLength: Math.round(avg) } };
        }

        function render() {
            const filtered = stateData.filter(u => {
                const searchMatch = u.name.toLowerCase().includes(currentSearch.toLowerCase());
                const phaseMatch = currentFilter === 'All' || u.state.currentPhase.name === currentFilter;
                return searchMatch && phaseMatch;
            });

            // Render Stats Grid
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = Object.values(PHASES).map(p => {
                const count = stateData.filter(u => u.state.currentPhase.name === p.name).length;
                return `
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden group">
                        <div class="w-12 h-12 rounded-2xl ${p.color} bg-opacity-10 flex items-center justify-center mb-4 transition-transform group-hover:scale-110">
                            <span class="${p.text}">${p.icon}</span>
                        </div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${p.name}</p>
                        <div class="flex items-baseline gap-1">
                            <p class="text-4xl font-black text-slate-900">${count}</p>
                            <p class="text-xs font-bold text-slate-300 italic">pilots</p>
                        </div>
                    </div>
                `;
            }).join('');

            // Render Intelligence
            const intel = document.getElementById('intelligence-content');
            const symptoms = {};
            stateData.forEach(u => u.symptoms.forEach(s => symptoms[s] = (symptoms[s] || 0) + 1));
            const top = Object.entries(symptoms).sort((a,b) => b[1]-a[1]).slice(0, 3);
            
            intel.innerHTML = `
                <div>
                    <p class="text-slate-400 text-[10px] font-black uppercase mb-3 tracking-widest">Top Pain Points</p>
                    <div class="flex flex-col gap-2">
                        ${top.map(([n, c]) => `
                            <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10">
                                <span class="text-sm font-bold">${n}</span>
                                <span class="bg-rose-500 text-[10px] px-2 py-0.5 rounded-full font-black">${Math.round((c/13)*100)}%</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="pt-4 border-t border-white/10">
                    <p class="text-xs text-slate-300 leading-relaxed italic">
                        Launch day strategy: Support the 7 pilots entering Follicular energy while stabilizing the 4 Luteal members.
                    </p>
                </div>
            `;

            // Render List
            const list = document.getElementById('pilot-list');
            list.innerHTML = filtered.map(u => `
                <div class="bg-white border border-slate-100 rounded-[2rem] p-6 flex flex-col md:flex-row items-center justify-between gap-6 hover:shadow-xl transition-all group">
                    <div class="flex items-center gap-5 min-w-[280px]">
                        <div class="w-16 h-16 rounded-[1.5rem] ${u.state.currentPhase.color} bg-opacity-10 flex items-center justify-center shrink-0 border-2 border-white shadow-sm transition-transform group-hover:rotate-6">
                            <span class="${u.state.currentPhase.text}">${u.state.currentPhase.icon}</span>
                        </div>
                        <div>
                            <h4 class="text-xl font-black text-slate-900 tracking-tight">${u.name}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md ${u.state.currentPhase.color} bg-opacity-10 ${u.state.currentPhase.text}">
                                    ${u.state.currentPhase.name} (Today)
                                </span>
                                <span class="text-[10px] font-bold text-slate-300">Day ${u.state.currentDay}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-wrap gap-2">
                        ${u.symptoms.map(s => `<span class="px-3 py-1.5 bg-slate-50 border border-slate-100 rounded-xl text-[9px] font-black text-slate-400 uppercase tracking-tighter">${s}</span>`).join('')}
                    </div>
                    <div class="bg-slate-50 px-6 py-4 rounded-3xl min-w-[200px] border border-slate-100 text-center">
                        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-1">Launch Anticipation</p>
                        <div class="flex items-center justify-center gap-2">
                            <div class="w-2 h-2 rounded-full ${PHASES[u.state.launchPhase.toUpperCase()]?.color || 'bg-slate-400'} animate-pulse-slow"></div>
                            <p class="text-sm font-black text-slate-700 uppercase">${u.state.launchPhase}</p>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 mt-1 italic">Day ${u.state.dayOnLaunch}</p>
                    </div>
                </div>
            `).join('');
        }

        // Init
        stateData = pilots.map(calculatePilotState);
        
        // Setup Filter Buttons
        const filterContainer = document.getElementById('phase-filters');
        ['All', 'Menstrual', 'Follicular', 'Luteal'].forEach(p => {
            const btn = document.createElement('button');
            btn.className = `px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter transition-all ${currentFilter === p ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`;
            btn.innerText = p;
            btn.onclick = () => {
                currentFilter = p;
                document.querySelectorAll('#phase-filters button').forEach(b => {
                    b.classList.remove('bg-slate-900', 'text-white', 'shadow-lg');
                    b.classList.add('bg-slate-100', 'text-slate-400');
                });
                btn.classList.add('bg-slate-900', 'text-white', 'shadow-lg');
                render();
            };
            filterContainer.appendChild(btn);
        });

        document.getElementById('search-input').oninput = (e) => {
            currentSearch = e.target.value;
            render();
        };

        window.onload = render;
    </script>
</body>
</html>
